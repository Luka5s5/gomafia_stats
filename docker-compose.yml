version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mafia_db
    environment:
      POSTGRES_DB: mafia_analytics
      POSTGRES_USER: mafia_user
      POSTGRES_PASSWORD: secure_password_123
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mafia_user -d mafia_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
